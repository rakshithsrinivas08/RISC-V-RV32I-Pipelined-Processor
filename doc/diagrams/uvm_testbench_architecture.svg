<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">
  <title>UVM testbench architecture for RISC-V RV32I processor</title>
  <desc>Structural diagram showing uvm_test containing uvm_env with agent, scoreboard, and coverage components, connected to the DUT</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- uvm_test (outermost container) -->
  <rect x="40" y="20" width="600" height="310" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">uvm_test</text>

  <!-- uvm_env (inner container) -->
  <rect x="65" y="56" width="550" height="200" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="76" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">uvm_env</text>

  <!-- Agent container -->
  <rect x="85" y="92" width="190" height="148" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="180" y="112" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Agent</text>

  <!-- Sequencer -->
  <rect x="100" y="126" width="160" height="28" rx="4" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <text x="180" y="140" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444">Sequencer</text>

  <!-- Driver -->
  <rect x="100" y="160" width="160" height="28" rx="4" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <text x="180" y="174" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444">Driver</text>

  <!-- Monitor -->
  <rect x="100" y="194" width="160" height="28" rx="4" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <text x="180" y="208" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444">Monitor</text>

  <!-- Scoreboard -->
  <rect x="340" y="92" width="170" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="425" y="114" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Scoreboard</text>
  <text x="425" y="134" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Reference model</text>

  <!-- Coverage -->
  <rect x="340" y="172" width="170" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="425" y="197" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Coverage</text>

  <!-- Arrow: Monitor → Scoreboard -->
  <line x1="260" y1="145" x2="338" y2="122" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="300" y="122" text-anchor="middle" font-size="12" fill="#888">TLM</text>

  <!-- Arrow: Monitor → Coverage -->
  <line x1="260" y1="208" x2="338" y2="197" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: Sequencer → Driver -->
  <line x1="180" y1="154" x2="180" y2="160" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DUT -->
  <rect x="240" y="345" width="200" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="363" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">DUT</text>
  <text x="340" y="381" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">rv32i_top</text>

  <!-- Arrow: Driver → DUT -->
  <path d="M150,188 L150,370 L238,370" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="130" y="290" text-anchor="middle" font-size="12" fill="#888">Stimulus</text>

  <!-- Arrow: DUT → Monitor -->
  <path d="M442,370 L520,370 L520,208 L262,208" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="540" y="290" text-anchor="middle" font-size="12" fill="#888">Response</text>
</svg>
