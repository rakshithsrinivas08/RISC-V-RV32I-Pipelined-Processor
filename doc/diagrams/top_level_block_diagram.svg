<svg width="100%" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">
  <title>RISC-V RV32I 5-stage pipelined processor block diagram</title>
  <desc>Block diagram showing IF, ID, EX, MEM, WB pipeline stages with sub-modules, pipeline registers, forwarding unit, and hazard detection unit</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Stage containers -->
  <rect x="18" y="38" width="100" height="155" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="150" y="38" width="112" height="155" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="294" y="38" width="112" height="155" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="438" y="38" width="100" height="155" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="570" y="38" width="90" height="155" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>

  <!-- Stage titles -->
  <text x="68" y="58" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">IF</text>
  <text x="206" y="58" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">ID</text>
  <text x="350" y="58" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">EX</text>
  <text x="488" y="58" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">MEM</text>
  <text x="615" y="58" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">WB</text>

  <!-- IF sub-modules -->
  <rect x="26" y="72" width="84" height="26" rx="4" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <text x="68" y="85" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444">PC</text>
  <rect x="26" y="104" width="84" height="26" rx="4" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <text x="68" y="117" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444">PC mux</text>

  <!-- ID sub-modules -->
  <rect x="158" y="72" width="96" height="26" rx="4" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <text x="206" y="85" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444">Register file</text>
  <rect x="158" y="104" width="96" height="26" rx="4" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <text x="206" y="117" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444">Imm gen</text>
  <rect x="158" y="136" width="96" height="26" rx="4" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <text x="206" y="149" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444">Control unit</text>

  <!-- EX sub-modules -->
  <rect x="302" y="72" width="96" height="26" rx="4" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <text x="350" y="85" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444">ALU</text>
  <rect x="302" y="104" width="96" height="26" rx="4" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <text x="350" y="117" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444">Branch unit</text>
  <rect x="302" y="136" width="96" height="26" rx="4" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <text x="350" y="149" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444">Fwd mux</text>

  <!-- MEM sub-modules -->
  <rect x="446" y="72" width="84" height="26" rx="4" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <text x="488" y="85" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444">Data mem IF</text>

  <!-- WB sub-modules -->
  <rect x="578" y="72" width="74" height="26" rx="4" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
  <text x="615" y="85" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444">WB mux</text>

  <!-- Pipeline registers -->
  <rect x="123" y="48" width="22" height="135" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <rect x="267" y="48" width="22" height="135" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <rect x="411" y="48" width="22" height="135" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <rect x="543" y="48" width="22" height="135" rx="4" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>

  <!-- Pipeline register labels -->
  <text x="134" y="198" text-anchor="middle" font-size="12" fill="#888">IF/ID</text>
  <text x="278" y="198" text-anchor="middle" font-size="12" fill="#888">ID/EX</text>
  <text x="422" y="198" text-anchor="middle" font-size="12" fill="#888">EX/MEM</text>
  <text x="554" y="198" text-anchor="middle" font-size="12" fill="#888">MEM/WB</text>

  <!-- Main data path arrows -->
  <line x1="118" y1="115" x2="150" y2="115" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="262" y1="115" x2="294" y2="115" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="406" y1="115" x2="438" y2="115" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="538" y1="115" x2="570" y2="115" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Forwarding unit -->
  <rect x="290" y="222" width="140" height="28" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="360" y="236" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#3C3489">Forwarding unit</text>

  <!-- Hazard detection unit -->
  <rect x="90" y="222" width="170" height="28" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="175" y="236" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#3C3489">Hazard detection unit</text>

  <!-- Forwarding: EX/MEM down to forwarding unit -->
  <path d="M422,183 L422,210 L430,222" fill="none" stroke="#7F77DD" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
  <!-- Forwarding: MEM/WB down and across to forwarding unit -->
  <path d="M554,183 L554,268 L420,268 L420,250" fill="none" stroke="#7F77DD" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
  <!-- Forwarding unit up to EX fwd mux -->
  <line x1="350" y1="222" x2="350" y2="165" stroke="#7F77DD" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

  <!-- Hazard unit stall signals up to IF and ID -->
  <path d="M140,222 L140,210 L68,210 L68,193" fill="none" stroke="#7F77DD" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
  <path d="M200,222 L200,210 L206,193" fill="none" stroke="#7F77DD" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

  <!-- Branch target: EX back to IF -->
  <path d="M310,38 L310,22 L68,22 L68,38" fill="none" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="189" y="17" text-anchor="middle" font-size="12" fill="#0F6E56">Branch target</text>

  <!-- Forwarding paths label -->
  <text x="470" y="268" font-size="12" fill="#888">Forwarding paths</text>
</svg>
